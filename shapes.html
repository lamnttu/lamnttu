<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hình tròn, Hình tam giác, Hình vuông</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 40px;
      gap: 32px;
    }
    h1 { color: #333; }
    .shapes {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .shape-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .shape-box span {
      font-size: 18px;
      font-weight: bold;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Các hình học cơ bản</h1>
  <div class="shapes">

    <!-- Hình tròn -->
    <div class="shape-box">
      <svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="55" fill="#4A90D9" stroke="#2C5F8A" stroke-width="3" />
      </svg>
      <span>Hình tròn</span>
    </div>

    <!-- Hình tam giác -->
    <div class="shape-box">
      <svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
        <polygon points="60,5 115,115 5,115" fill="#E67E22" stroke="#A04000" stroke-width="3" />
      </svg>
      <span>Hình tam giác</span>
    </div>

    <!-- Hình vuông -->
    <div class="shape-box">
      <svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="5" width="110" height="110" fill="#27AE60" stroke="#1A6B3A" stroke-width="3" />
      </svg>
      <span>Hình vuông</span>
    </div>

  </div>
</body>
</html>
